<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<form id="loginForm">

    <h1>Login</h1>

    <label>Email:</label><br>
    <input
        type="email"
        id="email"
        placeholder="Enter Email"
        required>

    <br><br>

    <label>Password:</label><br>
    <input
        type="password"
        id="password"
        placeholder="Enter Password"
        required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<script src="login.js"></script>

</body>
</html>
